<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Dress Up</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app" aria-label="Cat dress up game">
    <section class="intro-screen" aria-label="Start screen">
      <div class="monitor">
        <div class="monitor-screen">
          <button class="cat-start" type="button" aria-label="Start dress up">
            <img src="img/cat.png" alt="Cat">
          </button>
        </div>
        <div class="monitor-neck"></div>
        <div class="monitor-stand"></div>
      </div>
      <p class="hint">Click the cat</p>
    </section>

    <section class="dress-screen" aria-label="Dress up screen">
      <div class="cat-stage" aria-live="polite">
        <img src="img/cat.png" class="cat-img" alt="Cat">
      </div>

      <div class="item-bar" aria-label="Dress up items"></div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
