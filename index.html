<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }
        .visual {
            background-image: url(./images/visual_bg.jpg);
            background-position: center;
            background-size: cover;
        }
        .inner {
            height: 646px;
            width: min(1100px, 100%);
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .cat-scene {
            position: absolute;
            left: 50%;
            top: 50%;
            width: clamp(320px, 48vw, 560px);
            transform: translate(-50%, -50%);
        }

        .cat img {
            display: block;
            width: 100%;
            height: auto;
        }

        .sunglasses {
            position: absolute;
            left: 50%;
            top: -9%;
            width: 70%;
            transform: translate(-50%, 58%);
            animation: sunglasses-rise 1.25s ease-out 0.45s forwards;
        }

        .sunglasses img {
            display: block;
            width: 100%;
            height: auto;
        }

        .ribbon {
            position: absolute;
            right: 9%;
            top: 5%;
            width: 18%;
            transform: rotate(10deg);
        }

        .ribbon img {
            display: block;
            width: 100%;
            height: auto;
        }

        @keyframes sunglasses-rise {
            0% {
                opacity: 0;
                transform: translate(-50%, 58%);
            }
            75% {
                opacity: 1;
                transform: translate(-50%, -6%);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @media (max-width: 640px) {
            .inner {
                height: 520px;
            }

            .cat-scene {
                width: min(86vw, 420px);
            }
        }
    </style>
</head>
<body>
    <section class="visual">
        <div class="inner">
            <div class="cat-scene">
                <div class="cat">
                    <img src="./images/cat.png" alt="">
                </div>
                <div class="sunglasses">
                    <img src="./images/sunglasses.png" alt="">
                </div>
                <div class="ribbon">
                    <img src="./images/ribbon.png" alt="">
                </div>
            </div>
        </div>
    </section>
</body>
</html>
